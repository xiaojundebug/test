<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <script src="./vconsole.min.js"></script>
  <script>new VConsole()</script>
  <script src="https://static.mudu.tv/mudu-player/0.39.14/mudu-player.js"></script>
</head>

<body>
  <script>
    const proto = HTMLMediaElement.prototype;
    const originalPause = proto.pause;
    const originalPlay = proto.play;

    proto.pause = function (...args) {
      console.log(this);
      
      if (this.tagName === "VIDEO") {
        this.__pausedByManual = true;
      }
      return originalPause.apply(this, args);
    };
    proto.play = function (...args) {
      if (this.tagName === "VIDEO") {
        this.__pausedByManual = false;
      }
      return originalPlay.apply(this, args);
    };
  </script>
  <div id="container"></div>
  <script>
    var mup = muduPlayer("container");
    mup.setup({
      file: "//static.mudu.tv/video/productlcps/productlcps.m3u8",
    });

    setInterval(() => {
      const video = document.querySelector('#container video')
      const paused = video.paused
      const pausedByManual = video.__pausedByManual

      console.log(paused, pausedByManual);

      if (paused && !pausedByManual) {
        mup.play()
      }
    }, 100);
  </script>
</body>

</html>
