<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>

  <script src="./vconsole.min.js"></script>
  <script>new VConsole()</script>

  <script src="https://static.mudu.tv/mudu-player/0.39.14/mudu-player.js"></script>

  <style>
    body {
      font-family: monospace;
      margin: 0;
      padding: 0;
    }

    #container {
      width: 100%;
      height: 300px;
    }

    #log {
      white-space: pre-wrap;
      word-break: break-word;
      padding: 12px;
      background: #111;
      color: #0f0;
      font-size: 12px;
      line-height: 1.5;
      height: 50vh;
      overflow: auto;
      border-top: 1px solid #333;
    }

    .item {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>

<body>

  <div id="container"></div>

  <div id="log"></div>

  <script>
    const logEl = document.getElementById('log');

    function appendLog(text) {
      const div = document.createElement('div');
      div.className = 'item';

      // 保持 stack 原格式
      div.textContent = text;

      logEl.prepend(div);
    }

    const proto = HTMLMediaElement.prototype;

    const originalPause = proto.pause;
    const originalPlay = proto.play;

    proto.pause = function (...args) {

      let stack = '';

      try {
        stack = new Error().stack || '';
      } catch (e) {
        stack = '[stack unavailable]';
      }

      appendLog(
`===== PAUSE =====
time: ${new Date().toLocaleTimeString()}

src:
${this.currentSrc}

stack:
${stack}
`
      );

      return originalPause.apply(this, args);
    };

    proto.play = function (...args) {
      return originalPlay.apply(this, args);
    };
  </script>

  <script>
    var mup = muduPlayer("container");

    mup.setup({
      file: "//static.mudu.tv/video/productlcps/productlcps.m3u8",
    });
  </script>

</body>

</html>
