<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>

  <script src="./vconsole.min.js"></script>
  <script>new VConsole()</script>

  <script src="https://static.mudu.tv/mudu-player/0.39.14/mudu-player.js"></script>

  <style>
    #container {
      width: 100%;
      height: 300px;
    }

  </style>
</head>

<body>

  <div id="container"></div>

  <script>
    /**
 * 阻止 iOS 微信小程序环境下
 * wxMuteBackgroundMedia 触发的 video.pause()
 */
    function preventWxAutoPause() {

      // 只处理 iOS
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

      // 微信环境
      const isWechat = /MicroMessenger/i.test(navigator.userAgent);

      // 小程序环境
      const isMiniProgram =
        window.__wxjs_environment === 'miniprogram';

      if (!(isIOS && isWechat && isMiniProgram)) {
        return;
      }

      const proto = HTMLMediaElement.prototype;

      // 避免重复 patch
      if (proto.__wx_pause_patched__) {
        return;
      }

      proto.__wx_pause_patched__ = true;

      const originalPause = proto.pause;

      proto.pause = function (...args) {

        let stack = '';

        try {
          stack = new Error().stack || '';
        } catch (e) { }

        /**
         * 微信内部：
         * wxMuteBackgroundMedia
         */
        const isWxInternalPause =
          stack.includes('wxMuteBackgroundMedia');

        if (isWxInternalPause) {

          console.warn(
            '[preventWxAutoPause] blocked wx auto pause',
            this
          );

          // 阻止微信暂停
          return Promise.resolve();
        }

        return originalPause.apply(this, args);
      };
    }
  </script>

  <script>
    var mup = muduPlayer("container");

    mup.setup({
      file: "//static.mudu.tv/video/productlcps/productlcps.m3u8",
    });
  </script>

</body>

</html>
