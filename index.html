<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>

  <script src="./vconsole.min.js"></script>
  <script>new VConsole()</script>

  <script src="https://static.mudu.tv/mudu-player/0.39.14/mudu-player.js"></script>

  <style>
    #container {
      width: 100%;
      height: 300px;
    }
  </style>
</head>

<body>

  <div id="container"></div>

  <script>
    /**
     * 阻止 iOS 微信小程序环境下手动下滑控制中心或通知栏导致的音视频暂停
     */
    function preventWxAutoPause() {
      // 只处理 iOS
      var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      // 微信环境
      var isWechat = /MicroMessenger/i.test(navigator.userAgent);
      // 小程序环境
      var isMiniProgram =
        window.__wxjs_environment === 'miniprogram';

      if (!(isIOS && isWechat && isMiniProgram)) {
        return;
      }

      var proto = HTMLMediaElement.prototype;

      // 避免重复 patch
      if (proto.__wx_pause_patched__) {
        return;
      }

      proto.__wx_pause_patched__ = true;

      var originalPause = proto.pause;

      proto.pause = function () {
        var stack = '';

        try {
          stack = new Error().stack || '';
        } catch (e) { }

        /**
         * 微信内部：
         * wxMuteBackgroundMedia
         */
        var isWxInternalPause =
          stack.indexOf('wxMuteBackgroundMedia') !== -1;

        if (isWxInternalPause) {
          console.warn(
            '[preventWxAutoPause] blocked wx auto pause',
            this
          );

          // 阻止微信暂停
          return Promise.resolve();
        }

        return originalPause.apply(this, arguments);
      };

      document.onvisibilitychange = function () {
        // 页面隐藏时暂停视频，否则小程序关闭了还在播放声音会很奇怪
        if (document.visibilityState === 'hidden') {
          var videos = document.querySelectorAll('video');

          for (var i = 0; i < videos.length; i++) {
            videos[i].pause();
          }
        }
      };
    }
  </script>

  <script>
    preventWxAutoPause()

    var mup = muduPlayer("container");

    mup.setup({
      file: "//static.mudu.tv/video/productlcps/productlcps.m3u8",
    });
  </script>

</body>

</html>
