<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <script src="./vconsole.min.js"></script>
  <script>new VConsole()</script>
  <script src="https://static.mudu.tv/mudu-player/0.39.14/mudu-player.js"></script>
</head>

<body>
  <script>
    function ready() {
      console.log(window.__wxjs_environment === 'miniprogram') // true
      WeixinJSBridge.on('onPageStateChange', function(res) {
  console.log('res is active', res.active)
})


    }
    if (!window.WeixinJSBridge || !WeixinJSBridge.invoke) {
      document.addEventListener('WeixinJSBridgeReady', ready, false)
    } else {
      ready()
    }

  </script>
  <div id="container"></div>
  <script>
    var mup = muduPlayer("container");
    mup.setup({
      file: "//static.mudu.tv/video/productlcps/productlcps.m3u8",
    });

    setInterval(() => {
      const video = document.querySelector('#container video')
      const paused = video.paused
      const pausedByManual = video.__pausedByManual

      console.log(paused, pausedByManual);

      if (paused && !pausedByManual) {
        mup.play()
      }
    }, 100);
  </script>
</body>

</html>
